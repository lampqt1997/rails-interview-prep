<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Question Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* small custom adjustments while keeping existing .selected behaviour */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; }
    .app-wrap { max-width: 1100px; margin: 2rem auto; padding: 1rem; }
    .selected { background: #f0f8ff !important; }
    .question { margin-bottom: 0.5rem; font-weight: 600; }
    .meta { color: #555; }
    .list-group-item.qitem { cursor: pointer; }
    .list-group-item.session { cursor: pointer; color: #0366d6; }
  </style>
</head>
<body>
<div class="app-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Practice — question_bank</h1>
    <div class="text-end small meta">Session: <span id="session">not started</span></div>
  </div>

  <div class="row g-4">
    <div id="left" class="col-12 col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <div id="container">
            <div id="qidx" class="question">Loading questions...</div>
            <div id="text" class="mb-3" style="white-space:pre-wrap;"></div>

            <textarea id="answer" class="form-control mb-3" placeholder="Write your answer here..." rows="8"></textarea>

            <div class="d-flex flex-wrap gap-2">
              <button id="commit" class="btn btn-primary">Commit</button>
              <button id="commitAll" class="btn btn-outline-primary">Commit all</button>
              <button id="newSession" class="btn btn-success">New Session</button>
              <button id="skip" class="btn btn-secondary">Skip</button>
              <button id="prev" class="btn btn-outline-secondary">Prev</button>
              <button id="next" class="btn btn-outline-secondary">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="right" class="col-12 col-md-4">
      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <h6 class="card-title">Available sessions</h6>
          <div id="sessionsWrap" class="small text-muted">Loading...</div>
        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <h6 class="card-title">Session questions</h6>
          <div id="loadedInfo" class="small text-muted">No loaded session</div>
          <ul id="sessionQuestions" class="list-group list-group-flush mt-2"></ul>
          <div class="mt-2">
            <button id="startFromLoaded" class="btn btn-sm btn-outline-success">Start new run from loaded session</button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h6 class="card-title">Active question list</h6>
          <ul id="activeList" class="list-group list-group-flush mt-2"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // keep existing client script logic intact; only minor DOM-related expectations changed.
  // (script content preserved from the original app; make sure IDs remain the same)
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Original app script (keeps full functionality). Inserted here to preserve single-file usage.
  let allQuestions = []; // canonical full question bank
  let questions = [];     // active question list (usually same as allQuestions)
  let idx = 0;
  let filename = null;
  let answers = {}; // map idx -> text

  // data from previously loaded session (entries with index/question/answer)
  let loadedSession = null;

  function el(id) { return document.getElementById(id); }

  async function fetchJSON(url, opts) {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error('Network error ' + res.status);
    return res.json();
  }

  async function loadQuestions() {
    try {
      const json = await fetchJSON('/questions');
      allQuestions = json.questions || [];
      // initialize active questions to the full bank
      questions = allQuestions.slice();
      if (!questions.length) {
        el('qidx').textContent = 'No questions found in question_bank.md';
        renderActiveList();
        return;
      }
      render();
      renderActiveList();
    } catch (e) {
      el('qidx').textContent = 'Failed to load questions';
    }
    loadSessions();
  }

  async function loadSessions() {
    try {
      const json = await fetchJSON('/sessions');
      const wrap = el('sessionsWrap');
      wrap.innerHTML = '';
      if (!json.sessions || !json.sessions.length) {
        wrap.innerHTML = '<div class="small">No sessions yet</div>';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'list-group';
      json.sessions.forEach(s => {
        const li = document.createElement('li');
        li.className = 'list-group-item session';
        li.textContent = s.filename + ' ';
        const meta = document.createElement('span');
        meta.className = 'small text-muted';
        meta.textContent = '(' + s.mtime + ')';
        li.appendChild(meta);
        li.addEventListener('click', () => loadSessionFile(s.filename, li));
        ul.appendChild(li);
      });
      wrap.appendChild(ul);
    } catch (e) {
      el('sessionsWrap').textContent = 'Failed to list sessions';
    }
  }

  async function loadSessionFile(fname, liEl) {
    // visual selection
    Array.from(document.querySelectorAll('li.session')).forEach(x => x.classList.remove('selected'));
    if (liEl) liEl.classList.add('selected');

    try {
      const json = await fetchJSON('/session/' + encodeURIComponent(fname));
      loadedSession = { filename: fname, entries: json.entries || [] };
      el('loadedInfo').textContent = 'Loaded ' + fname;
      renderSessionQuestions();
    } catch (e) {
      el('loadedInfo').textContent = 'Failed to load session';
      loadedSession = null;
      renderSessionQuestions();
    }
  }

  function renderSessionQuestions() {
    const ul = el('sessionQuestions');
    ul.innerHTML = '';
    if (!loadedSession) {
      ul.innerHTML = '<li class="list-group-item small">No loaded session</li>';
      return;
    }
    loadedSession.entries.forEach((ent, i) => {
      const li = document.createElement('li');
      li.className = 'list-group-item qitem';
      li.textContent = (ent.index + 1) + '. ' + ent.question;
      li.addEventListener('click', () => {
        // ensure active list is the full question bank, and set active index to the original question index
        if (allQuestions.length) {
          questions = allQuestions.slice();
          renderActiveList();
        }
        saveCurrentAnswer();
        idx = typeof ent.index === 'number' ? ent.index : i;
        el('qidx').textContent = 'Question ' + (idx + 1) + ' / ' + questions.length;
        el('text').textContent = ent.question;
        el('answer').value = ent.answer || '';
      });
      ul.appendChild(li);
    });
  }

  function renderActiveList() {
    const ul = el('activeList');
    ul.innerHTML = '';
    if (!questions.length) {
      ul.innerHTML = '<li class="list-group-item small">No active questions</li>';
      return;
    }
    questions.forEach((q, i) => {
      const li = document.createElement('li');
      li.className = 'list-group-item qitem';
      li.textContent = (i + 1) + '. ' + q;
      li.addEventListener('click', () => {
        saveCurrentAnswer();
        idx = i;
        render();
      });
      // highlight currently active
      if (i === idx) li.classList.add('selected');
      ul.appendChild(li);
    });
  }

  async function startSession() {
    try {
      const json = await fetchJSON('/start', { method: 'POST', headers: {'Content-Type':'application/json'} });
      filename = json.filename;
      el('session').textContent = filename;
    } catch (e) {
      alert('Failed to start session');
    }
  }

  function render() {
    if (!questions.length) {
      el('qidx').textContent = 'No questions loaded';
      el('text').textContent = '';
      el('answer').value = '';
      return;
    }
    el('qidx').textContent = 'Question ' + (idx + 1) + ' / ' + questions.length;
    el('text').textContent = questions[idx];
    el('answer').value = answers.hasOwnProperty(idx) ? answers[idx] : '';
    renderActiveList();
  }

  function saveCurrentAnswer() {
    if (!questions.length) return;
    const v = el('answer').value;
    if (v && v.trim().length) answers[idx] = v;
    else if (answers.hasOwnProperty(idx) && (!v || !v.trim())) delete answers[idx];
  }

  async function commitAnswer() {
    if (!filename) {
      alert('Session not started');
      return;
    }
    saveCurrentAnswer();
    const payload = { filename, index: idx, question: questions[idx], answer: answers[idx] || '' };
    try {
      const json = await fetchJSON('/commit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (json.ok) {
        if (idx < questions.length - 1) idx++;
        render();
      } else {
        alert('Failed to save: ' + (json.error || 'unknown'));
      }
    } catch (e) {
      alert('Failed to save');
    }
  }

  async function commitAll() {
    if (!filename) {
      alert('Session not started');
      return;
    }
    saveCurrentAnswer();
    try {
      const payload = { filename, questions, answers };
      const json = await fetchJSON('/commit_all', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (json.ok) {
        alert('All answers appended to ' + filename);
      } else {
        alert('Failed to commit all: ' + (json.error || 'unknown'));
      }
    } catch (e) {
      alert('Failed to commit all');
    }
  }

  document.getElementById('commit').addEventListener('click', commitAnswer);
  document.getElementById('commitAll').addEventListener('click', commitAll);
  document.getElementById('skip').addEventListener('click', () => { if (idx < questions.length -1) { saveCurrentAnswer(); idx++; render(); } });
  document.getElementById('next').addEventListener('click', () => { if (idx < questions.length -1) { saveCurrentAnswer(); idx++; render(); } });
  document.getElementById('prev').addEventListener('click', () => { if (idx > 0) { saveCurrentAnswer(); idx--; render(); } });

  // start a run from the currently loaded session:
  // - use the full question bank as active questions
  // - prefill answers at their original indices so "Next" continues into the rest of the bank
  document.getElementById('startFromLoaded').addEventListener('click', async () => {
    if (!loadedSession) { alert('No session loaded'); return; }
    try {
      const json = await fetchJSON('/start', { method: 'POST', headers: {'Content-Type':'application/json'} });
      filename = json.filename;
      el('session').textContent = filename;

      // ensure active questions are the full bank
      questions = allQuestions.slice();

      // prefill answers using the original indices from the session entries
      answers = {};
      loadedSession.entries.forEach(e => {
        if (e.answer && e.answer.trim()) answers[e.index] = e.answer;
      });

      // start at the first of those saved indices if available, else 0
      idx = (loadedSession.entries.length && typeof loadedSession.entries[0].index === 'number') ? loadedSession.entries[0].index : 0;

      render();
    } catch (e) {
      alert('Failed to start new run from session');
    }
  });

  // NEW: start brand-new session from question 1
  document.getElementById('newSession').addEventListener('click', async () => {
    try {
      const json = await fetchJSON('/start', { method: 'POST', headers: {'Content-Type':'application/json'} });
      filename = json.filename;
      el('session').textContent = filename;
      // reset active questions to full bank and clear answers
      questions = allQuestions.slice();
      answers = {};
      idx = 0;
      render();
    } catch (e) {
      alert('Failed to create new session');
    }
  });

  // init
  loadQuestions();
</script>
</body>
</html>
